# Databricks App runtime config for the web UI. Mirrors app/app.yaml's shape and
# rationale: command/env live only here (no inline `config` on the bundle resource, matching
# resources/webui.yml's comment on why -- avoids a merge conflict / empty-interpolation risk).
#
# `source_code_path: ../webui` (resources/webui.yml) uploads the CONTENTS of webui/ to the
# working-dir root: main.py, frontend/dist/ (the committed SPA build), pyproject.toml, uv.lock,
# and wheels/*.whl (both the lock and the wheel are staged by `make webui-wheel`, which MUST run
# before `bundle deploy` -- see scripts/deploy.sh). Unlike app/app.yaml, no `ln -sf` symlink trick
# is needed here: main.py imports `app.*` from the installed WHEEL (via pyproject.toml), not from
# same-directory sibling files.
#
# Databricks Apps selects the uv dependency path (Python 3.12, per pyproject.toml's
# `requires-python`) because this dir ships pyproject.toml + uv.lock and NO requirements.txt -- a
# requirements.txt would force pip AND Python 3.11, on which the databricks-code-search wheel
# (requires-python >=3.12) refuses to install and the app crashes ("requires a different Python").
# `uv run` executes uvicorn inside the uv-provisioned 3.12 venv, installing from uv.lock on first
# run; `--frozen` keeps it from re-resolving. The shell form is REQUIRED so the injected
# DATABRICKS_APP_PORT (default 8000; never 8080) expands -- an exec-array form would not.
command: ["bash", "-c", "uv run --frozen uvicorn main:app --host 0.0.0.0 --port ${DATABRICKS_APP_PORT:-8000}"]
env:
  # Only LAKEBASE_ENDPOINT is set here; DATABRICKS_HOST and the app SP OAuth creds are
  # auto-injected by the Apps runtime (WorkspaceClient() self-configures), same as app/app.yaml.
  - name: LAKEBASE_ENDPOINT
    value: "projects/code-search/branches/production/endpoints/primary"
  # uv hardlinks from its cache into the venv by default and warns (or fails with a cross-device
  # link error) when they sit on different mounts, as they do in the Apps sandbox. Copy mode is
  # the documented remedy.
  - name: UV_LINK_MODE
    value: "copy"
