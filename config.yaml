# ┌──────────────────────────────────────────────────────────────────────────┐
# │ CHANGE THIS FIRST. This ships pointed at the repo author's GitHub        │
# │ account. If you deploy it unedited you will index someone else's repos   │
# │ — every 12 hours — and your searches will silently return their code.    │
# │ Replace `IceRhymers` below with your own org or user, then `make deploy`.│
# └──────────────────────────────────────────────────────────────────────────┘
version: 1

# How many repos the job indexes at once. Default 4, max 8, min 1.
# This is a DISK bound, not a CPU one: each worker holds its 500 MB tarball and
# its 2 GB extraction alive at the same time, so budget 2.5 GB per worker —
# 10 GB at the default 4, 20 GB at the ceiling of 8.
# Returns at the ceiling are sublinear: symbol extraction does not parallelise
# (measured 0.95x on 4 threads), so you buy far less than 8x for a hard linear
# 20 GB of disk. Raise it knowing that.
# With semantic indexing enabled this is clamped to 2 — a MEMORY bound, since
# embedding materialises a whole repo's chunks (~0.5-0.8 GB per worker).
# index_concurrency: 4

connections:
  - type: github
    # orgs / users / repos are UNIONED, then deduplicated by canonical org/repo.
    users:
      - IceRhymers

    # orgs:
    #   - acme
    #   - acme-labs

    # Explicitly listed repos are indexed VERBATIM — no enumeration API call,
    # and `exclude` below does NOT apply to them. Explicit always wins.
    # repos:
    #   - otherorg/specific-repo

    # `exclude` filters ONLY repos discovered via `orgs` / `users`.
    # exclude:
    #   forks: true       # default true — forks duplicate their upstream
    #   archived: true    # default true — re-downloaded every run, never change
    #   repos:            # fnmatch globs against canonical org/repo
    #     - "acme/*-deprecated"
    #     - "acme/test-*"
    #   size_mb: 500      # GitHub reports size in KB; this is MB. Default: no cap.
