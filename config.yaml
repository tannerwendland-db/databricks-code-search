# Set your GitHub org(s), user(s), or repo(s) under `connections` below, then
# `make deploy`. This template ships with nothing selected — the indexer fails
# fast ("connection selects nothing") until you uncomment and fill one in.
version: 1

# How many repos the job indexes at once. Default 4, max 8, min 1.
# This is a DISK bound, not a CPU one: each worker holds its 500 MB tarball and
# its 2 GB extraction alive at the same time, so budget 2.5 GB per worker —
# 10 GB at the default 4, 20 GB at the ceiling of 8.
# Returns at the ceiling are sublinear: symbol extraction does not parallelise
# (measured 0.95x on 4 threads), so you buy far less than 8x for a hard linear
# 20 GB of disk. Raise it knowing that.
# With semantic indexing enabled this is clamped to 2 — a MEMORY bound, since
# embedding materialises a whole repo's chunks (~0.5-0.8 GB per worker).
# index_concurrency: 4

connections:
  - type: github
    # orgs / users / repos are UNIONED, then deduplicated by canonical org/repo.
    # users:
    #   - your-github-username

    # orgs:
    #   - acme
    #   - acme-labs

    # Explicitly listed repos are indexed VERBATIM — no enumeration API call,
    # and `exclude` below does NOT apply to them. Explicit always wins.
    # repos:
    #   - otherorg/specific-repo

    # Extra branches to index PER REPO, on top of the default branch (always
    # included regardless of match). Glob patterns (fnmatchcase, exact-name
    # match, NOT a regex) against each repo's branch list. Empty (the
    # default) means default-branch-only — no behavior change for an
    # unmodified config, and the GitHub branches API is not even called.
    # Soft-capped at 20 branches per repo (default-first, then alphabetical);
    # see docs/runbooks/multi-branch.md.
    # branches:
    #   - "main"
    #   - "release/*"

    # `exclude` filters ONLY repos discovered via `orgs` / `users`.
    # exclude:
    #   forks: true       # default true — forks duplicate their upstream
    #   archived: true    # default true — re-downloaded every run, never change
    #   repos:            # fnmatch globs against canonical org/repo
    #     - "acme/*-deprecated"
    #     - "acme/test-*"
    #   size_mb: 500      # GitHub reports size in KB; this is MB. Default: no cap.

# Per-repo override of the semantic chunk-embedding ceiling (default 8000, env
# CODE_SEARCH_SEMANTIC_MAX_CHUNKS_PER_REPO — see app/config.py). A repo whose
# real chunk count exceeds the GLOBAL cap degrades to indexing its core corpus
# WITHOUT chunks (semantic is additive, never fails the branch); list it here to
# raise (or lower) its own cap instead of moving the default for every repo.
# Keys are canonicalised the same way as `repos:` above (URL/SSH/bare all work,
# matched case-insensitively); an override naming a repo the corpus never
# resolves logs a WARNING (typo guard) and is otherwise a no-op.
#
# Mind the memory math before raising one: buffered vectors are ~32 KB/chunk
# (dim=1024, Python float-list storage), so 8000 ≈ 260 MB resident for the
# duration of that repo's write. With semantic on, at most 2 workers run
# concurrently (indexer/repo_config.py's effective_workers clamp), so a large
# override multiplies straight into the job container's peak memory — e.g. two
# repos overridden to 20000 concurrently is ≈1 GB just in vectors, on top of
# the base per-worker cost. A repo that legitimately needs far more than that
# needs the temp-table staging path (follow-up), not a bigger override.
# semantic_max_chunks_per_repo:
#   "acme/huge-monorepo": 20000
