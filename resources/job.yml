# Serverless indexing job (#7). Runs the `code-search-index` wheel entry point on a
# schedule, fetching each configured repo as a tarball (no git binary) and upserting
# repos/files/symbols with SHA-stamped mark-and-sweep.
#
# The wheel is built by the top-level `artifacts.wheel` target in databricks.yml
# (`uv build --wheel`) and attached via the serverless environment `dependencies`.
resources:
  jobs:
    code_search_index:
      name: code-search-index
      # One logical corpus writer: reconciliation performs corpus-wide desired-state
      # cleanup, which is only safe if at most one run can be deriving/applying a desired
      # inventory at a time. DABs' `mode: development` targets (dev, ci) default this to 4
      # if left unset -- `mode: production` already resolves it to 1 by default, but pinning
      # it explicitly here makes the invariant uniform across every target and immune to a
      # future mode-preset change, rather than relying on prod's default happening to agree.
      # Queueing (below) is what makes the pin harmless to throughput -- an overlapping
      # scheduled/manual trigger waits instead of being dropped. See indexer/job.py's module
      # docstring and docs/runbooks/indexing-parallelism.md §1.1 for the full invariant and
      # what it does NOT cover (per-repo/per-branch concurrency within one run).
      max_concurrent_runs: 1
      tasks:
        - task_key: index
          environment_key: default
          python_wheel_task:
            package_name: databricks-code-search
            entry_point: code-search-index
            named_parameters:
              # Bare `${workspace.file_path}` — it already resolves to an absolute
              # /Workspace/... path. Writing /Workspace/${workspace.file_path} yields a
              # doubled, broken path (databricks/cli#2300).
              config: ${workspace.file_path}/config.yaml
              # Underscore, NOT hyphen: python_wheel_task emits each key verbatim as
              # `--<key>=<value>`, so this must match argparse's `--max_repos` exactly.
              max_repos: ${var.max_repos}
              scope: ${var.github_token_secret_scope}
              key: ${var.github_token_secret_key}
              endpoint: projects/${var.lakebase_project_name}/branches/production/endpoints/${var.lakebase_endpoint_name}
              database: ${var.database_name}
      environments:
        - environment_key: default
          spec:
            client: "3"  # serverless env client version — CONFIRM via live `bundle validate`
            dependencies:
              # Glob is resolved relative to THIS file (resources/), so reach up to the
              # bundle-root dist/ where artifacts.wheel (`uv build --wheel`) writes it.
              - ../dist/*.whl
      schedule:
        quartz_cron_expression: ${var.index_schedule}
        timezone_id: UTC
      queue:
        enabled: true
