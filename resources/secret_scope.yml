# The secret scope that holds the GitHub token used by the indexing job (#7).
# The bundle CREATES the scope; the value is set out-of-band via `make set-secrets`
# (deploy first — the scope must exist before `databricks secrets put-secret`).
resources:
  secret_scopes:
    gh_token:
      name: ${var.github_token_secret_scope}
      backend_type: DATABRICKS
