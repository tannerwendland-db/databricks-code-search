# Alembic configuration for the code search core schema.
#
# There is deliberately no sqlalchemy.url here: the engine is provided by
# app.db.client.create_db_engine(). For Lakebase, scripts/migrate.py injects a
# live connection via config.attributes["connection"]; for local Postgres,
# env.py falls back to create_db_engine() when PGHOST is set.

[alembic]
script_location = app/alembic
prepend_sys_path = .
path_separator = os

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys_stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
