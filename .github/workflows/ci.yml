name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        # --all-extras pulls in webui's fastapi (an optional extra, not a core MCP-app
        # dependency -- see pyproject.toml), so mypy webui / the webui unit tests see it.
        run: uv sync --all-groups --all-extras
      - name: Lint
        run: make lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        # --all-extras pulls in webui's fastapi (an optional extra, not a core MCP-app
        # dependency -- see pyproject.toml), so mypy webui / the webui unit tests see it.
        run: uv sync --all-groups --all-extras
      - name: Unit tests
        run: make test

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webui/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: webui/frontend
      - name: Frontend tests
        run: make webui-test
      - name: Dist freshness (issue #80)
        run: make webui-verify-dist

  # Integration coverage lives in ci-lakebase.yml: this project is Lakebase-only, and
  # the integration suite runs against an ephemeral Lakebase branch (real lakebase_ann /
  # lakebase_bm25 operators -- no Postgres image can stand in for them).
