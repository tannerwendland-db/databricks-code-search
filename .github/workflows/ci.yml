name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Lint
        run: make lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Unit tests
        run: make test

  # Container-based integration coverage. This is a STAND-IN for the real engine: the
  # semantic path's `lakebase_ann` ordered-index scan and `lakebase_bm25` scorer exist in
  # no Postgres image, so this job substitutes pgvector `<=>` + `ts_rank_cd`. It proves the
  # RRF plumbing and the ANN leg, but NOT BM25 ranking and NOT the BM25 leg's query plan.
  # `ci-lakebase.yml` closes that gap against a real Lakebase branch; it is disabled until
  # a CI project exists (docs/runbooks/ci-lakebase.md). Remove this job once that one is
  # green -- until then it is the only integration coverage that actually runs.
  integration:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: codesearch
          POSTGRES_PASSWORD: codesearch
          POSTGRES_DB: codesearch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: codesearch
      PGPASSWORD: codesearch
      PGDATABASE: codesearch
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          python-version: "3.12"
      - name: pg_trgm smoke test
        run: |
          psql "postgresql://$PGUSER:$PGPASSWORD@$PGHOST:$PGPORT/$PGDATABASE" \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" \
            -c "SELECT similarity('foo', 'food');"
      - name: Install dependencies
        run: make install
      - name: Integration tests
        run: make test-integration
