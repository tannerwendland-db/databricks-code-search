# Integration tests against a REAL Lakebase branch -- the project's ONLY integration
# gate (this project is Lakebase-only; no Postgres image can stand in for the
# `lakebase_ann` `<=>` ordered-index scan or `lakebase_bm25`'s `ts <@>
# to_bm25query(...)` scorer, and a stand-in cannot prove BM25 ranking or reveal a
# query-plan collapse on that leg -- a real regression of exactly that kind was
# caught in review, not by CI).
#
# PREREQUISITES (operator, out-of-band; until they exist the vars guard below
# no-ops the job on every PR):
#   1. the `code-search-ci` Lakebase project provisioned, with its managed
#      shared_preload_libraries including lakebase_vector,lakebase_text,
#   2. repo secrets DATABRICKS_HOST / DATABRICKS_CLIENT_ID / DATABRICKS_CLIENT_SECRET,
#   3. repository variable CI_LAKEBASE_ENABLED set to "true".
# See docs/runbooks/ci-lakebase.md.
#
# ISOLATION: each run forks a throwaway Lakebase branch (copy-on-write, so it is
# cheap) and purges it in an `always()` step. The suite creates and drops extensions
# and tables, so a shared database would let concurrent PRs corrupt each other. The
# branch also carries a TTL, so a cancelled run cannot leak a branch indefinitely.

name: CI (Lakebase)

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  # One CI branch per git ref: a re-run must not race the previous run's teardown
  # for the same branch id.
  group: ci-lakebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-lakebase:
    runs-on: ubuntu-latest
    # Second, independent guard: even a manual dispatch is inert until the project
    # exists and the repo variable is flipped.
    if: vars.CI_LAKEBASE_ENABLED == 'true'
    env:
      # Service-principal auth; the SDK reads these directly. Prefer OIDC federation
      # over a long-lived secret once the workspace is configured for it.
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      CI_LAKEBASE_PROJECT: ${{ vars.CI_LAKEBASE_PROJECT || 'code-search-ci' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          python-version: "3.12"
      # Future-readiness: no step here calls the `databricks` CLI directly today (the
      # SDK-driven scripts below authenticate via DATABRICKS_HOST/CLIENT_ID/CLIENT_SECRET
      # env vars, not the CLI), but tests/integration/test_job_resource_resolved.py --
      # part of `make test-integration` below -- shells out to `databricks bundle
      # validate` and skip-guards itself when the binary is absent. Installing it here is
      # what turns that guard into a real assertion in this job instead of a permanent
      # skip, and costs nothing on the runners where it stays unexercised (e.g. this
      # job's vars.CI_LAKEBASE_ENABLED-gated no-op path).
      - uses: databricks/setup-cli@dd60b7b133203edca3e8f08b1e053c43a979296e  # v1.8.0
        with:
          version: "1.8.0"

      - name: Install dependencies
        run: make install

      - name: Derive branch id
        id: branch
        # Lakebase branch ids are slugs: lowercase, no slashes. Keep it stable per ref so
        # a re-run replaces its own branch rather than accumulating new ones.
        run: |
          slug="$(printf '%s' "ci-${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}" \
            | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | cut -c1-48)"
          echo "id=${slug%-}" >> "$GITHUB_OUTPUT"

      - name: Create ephemeral Lakebase branch
        run: |
          uv run python scripts/ci_branch.py up \
            --project "$CI_LAKEBASE_PROJECT" \
            --branch "${{ steps.branch.outputs.id }}" >> "$GITHUB_ENV"

      - name: Apply migrations
        # PGHOST must stay unset so app/db/client.py takes the Lakebase OAuth path.
        # The core chain includes 0004 (semantic `chunks` + real lakebase_vector /
        # lakebase_text DDL) -- no separate semantic step, no ack.
        run: uv run python scripts/migrate.py

      - name: Integration tests (real Lakebase engine)
        run: make test-integration

      - name: Purge ephemeral Lakebase branch
        # always(): a leaked branch costs money, and teardown must run even when the
        # tests fail (which is exactly when it is most likely to be skipped).
        if: always()
        run: |
          uv run python scripts/ci_branch.py down \
            --project "$CI_LAKEBASE_PROJECT" \
            --branch "${{ steps.branch.outputs.id }}"
